<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <!-- <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /> -->
        <!-- <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        /> -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Scorepact</title>

        <!-- Add inside <head> of your existing index.html, before the module script. -->

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Newsreader:ital,opsz,wght@0,18..72,400;0,18..72,500;0,18..72,600;1,18..72,400;1,18..72,500;1,18..72,600&display=swap"
            rel="stylesheet"
        />

        <!-- Set theme before first paint so there is no light->dark flash. -->
        <script>
            (function () {
                try {
                    var t =
                        localStorage.getItem("sp-theme") ||
                        (matchMedia("(prefers-color-scheme: dark)").matches
                            ? "dark"
                            : "light");
                    document.documentElement.setAttribute("data-theme", t);
                } catch (e) {}
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
